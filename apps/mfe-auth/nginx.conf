server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # CORS is mandatory — the shell (different origin) fetches remoteEntry.js
    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type" always;

    # Handle pre-flight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Immutable cache for content-hashed chunks
    location /assets/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # remoteEntry.js must NOT be cached — federation host re-fetches it on load
    location = /assets/remoteEntry.js {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Standalone dev fallback (SPA); ignored when loaded as remote
    location / {
        try_files $uri $uri/ /index.html;
    }
}
